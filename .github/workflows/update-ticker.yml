name: Update Ticker

on:
  schedule:
    # 22:10 UTC daily, after the US market close (handles crypto too, 24/7)
    - cron: "10 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-ticker
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate ticker.svg
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python ticker.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet ticker.svg; then
            git add ticker.svg
            git commit -m "chore: update ticker $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No change in ticker.svg"
          fi
